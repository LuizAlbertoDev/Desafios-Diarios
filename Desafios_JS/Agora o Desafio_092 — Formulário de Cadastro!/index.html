<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agora o Desafio_092 — Formulário de Cadastro!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2>Formulário de Cadastro</h2>

    <input type="text" id="input-nome" placeholder="Digite seu nome">
    <p id="erro-nome" class="erro"></p>

    <input type="text" id="input-email" placeholder="Digite seu email">
    <p id="erro-email" class="erro"></p>

    <input type="number" id="input-idade" placeholder="Digite sua idade">
    <p id="erro-idade" class="erro"></p>

    <button id="btn-cadastrar">
        Cadastrar
    </button>

    <div id="resultado"></div>

    <script src="script.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Desafio_094 — Abas de Conteúdo</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="abas">

    <button class="aba ativa" data-aba="html">
      HTML
    </button>

    <button class="aba" data-aba="css">
      CSS
    </button>

    <button class="aba" data-aba="js">
      JavaScript
    </button>

  </div>

  <div class="conteudo ativo" id="html">
    <h2>HTML</h2>
    <p>
      HTML é a linguagem usada para estruturar páginas web.
    </p>
  </div>

  <div class="conteudo" id="css">
    <h2>CSS</h2>
    <p>
      CSS é usado para estilizar os elementos da página.
    </p>
  </div>

  <div class="conteudo" id="js">
    <h2>JavaScript</h2>
    <p>
      JavaScript adiciona interatividade às páginas.
    </p>
  </div>

  <script src="script.js"></script>
</body>
</html>
